<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Executivo | Ammo 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-slate-900 text-white p-6 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">ÓTICAS AMMO <span class="text-blue-400 font-light">360</span></h1>
                <p class="text-slate-400 text-sm mt-1">Prestação de Contas Executiva</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-slate-400">Última atualização</p>
                <p id="dataSincronismo" class="font-medium text-blue-300">Carregando...</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 mt-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                <div>
                    <h2 class="text-gray-500 font-medium text-sm uppercase tracking-wider">Faturamento Total (Mês Atual)</h2>
                    <p id="totalMesGeral" class="text-4xl font-bold text-slate-800 mt-2">R$ 0,00</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-full">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center justify-between border-l-4 border-l-green-500">
                <div>
                    <h2 class="text-gray-500 font-medium text-sm uppercase tracking-wider">Faturamento Hoje (Consolidado)</h2>
                    <p id="totalHojeGeral" class="text-4xl font-bold text-green-600 mt-2">R$ 0,00</p>
                </div>
                <div class="bg-green-50 p-4 rounded-full">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Ranking de Vendas Acumuladas</h3>
            <div class="relative h-80">
                <canvas id="graficoLojas"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Evolução Diária por Loja</h3>
                <div class="relative h-80">
                    <canvas id="graficoDiario"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-0 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-gray-100 bg-gray-50">
                    <h3 class="text-lg font-bold text-gray-800">Fechamentos de Hoje</h3>
                    <p class="text-sm text-gray-500">Lojas ativas no dia de hoje</p>
                </div>
                <div class="p-0 flex-1 overflow-auto">
                    <table class="w-full text-left border-collapse">
                        <tbody id="listaHoje" class="divide-y divide-gray-100">
                            <tr><td class="p-6 text-center text-gray-400">Carregando dados...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // COLE A URL DO SEU GOOGLE APPS SCRIPT AQUI
        // ==========================================
        const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbxfVzjpW8ezzfB9Jog128GIYasbvTWpPa_GYN7lGhrsTsNOLZY_QrhEscGxya3rlbNNhQ/exec"; 

        Chart.register(ChartDataLabels);

        // Paleta de cores para até 15 lojas
        const paletaCores = [
            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
            '#06b6d4', '#ec4899', '#f97316', '#6366f1', '#14b8a6',
            '#84cc16', '#eab308', '#d946ef', '#64748b', '#0ea5e9'
        ];

        async function iniciarPainel() {
            try {
                const resposta = await fetch(URL_WEB_APP);
                const dados = await resposta.json();

                if (dados.erro) {
                    alert("Erro: " + dados.erro);
                    return;
                }
                atualizarInterface(dados);
            } catch (erro) {
                console.error("Erro ao buscar dados:", erro);
            }
        }

        function atualizarInterface(dados) {
            document.getElementById('dataSincronismo').innerText = dados.dataSincronismo;
            document.getElementById('totalMesGeral').innerText = formatarMoeda(dados.totalMes);

            let totalHoje = 0;
            const resumoHoje = {};
            
            dados.vendasHoje.forEach(venda => {
                const loja = venda[0];
                const valor = parseFloat(venda[1]);
                if (!resumoHoje[loja]) resumoHoje[loja] = 0;
                resumoHoje[loja] += valor;
                totalHoje += valor;
            });

            document.getElementById('totalHojeGeral').innerText = formatarMoeda(totalHoje);
            renderizarListaHoje(resumoHoje);
            
            // Renderiza os dois gráficos
            renderizarGraficoAcumulado(dados.acumuladoPorLoja);
            renderizarGraficoDiario(dados.vendasDiarias, dados.acumuladoPorLoja);
        }

        function renderizarListaHoje(resumoHoje) {
            const tbody = document.getElementById('listaHoje');
            tbody.innerHTML = ''; 
            const lojasHoje = Object.keys(resumoHoje).sort((a, b) => resumoHoje[b] - resumoHoje[a]); 

            if (lojasHoje.length === 0) {
                tbody.innerHTML = `<tr><td class="p-6 text-center text-gray-500 italic">Nenhuma venda registrada hoje.</td></tr>`;
                return;
            }

            lojasHoje.forEach(loja => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-4 font-medium text-gray-700">${loja}</td><td class="p-4 text-right font-bold text-green-600">${formatarMoeda(resumoHoje[loja])}</td>`;
                tbody.appendChild(tr);
            });
        }

        let graficoAcumuladoObj = null;
        let graficoDiarioObj = null;

        function renderizarGraficoAcumulado(acumuladoPorLoja) {
            const lojasOrdenadas = Object.keys(acumuladoPorLoja).sort((a, b) => acumuladoPorLoja[b] - acumuladoPorLoja[a]);
            const valoresOrdenados = lojasOrdenadas.map(loja => acumuladoPorLoja[loja]);
            const ctx = document.getElementById('graficoLojas').getContext('2d');
            
            if (graficoAcumuladoObj) graficoAcumuladoObj.destroy(); 

            graficoAcumuladoObj = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lojasOrdenadas,
                    datasets: [{
                        label: 'Acumulado Mês',
                        data: valoresOrdenados,
                        backgroundColor: '#3b82f6', 
                        borderRadius: 4
                    }]
                },
                options: {
                    layout: { padding: { top: 30 } },
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end', align: 'top', color: '#1e293b', font: { weight: 'bold', size: 11 },
                            formatter: (value) => formatarMoeda(value)
                        }
                    }
                }
            });
        }

        function renderizarGraficoDiario(vendasDiarias, acumuladoPorLoja) {
            const ctx = document.getElementById('graficoDiario').getContext('2d');
            
            const hoje = new Date();
            const mes = hoje.getMonth();
            const ano = hoje.getFullYear();
            const diasNoMes = new Date(ano, mes + 1, 0).getDate();
            
            const labelsDias = [];
            const chavesBusca = [];
            
            for (let i = 1; i <= diasNoMes; i++) {
                const diaStr = String(i).padStart(2, '0');
                const mesStr = String(mes + 1).padStart(2, '0');
                labelsDias.push(`${diaStr}/${mesStr}`);
                chavesBusca.push(`${diaStr}/${mesStr}/${ano}`);
            }

            const todasLojas = Object.keys(acumuladoPorLoja).sort();
            
            const datasets = todasLojas.map((loja, index) => {
                const dadosLoja = chavesBusca.map(data => {
                    return (vendasDiarias[data] && vendasDiarias[data][loja]) ? vendasDiarias[data][loja] : 0;
                });
                
                const cor = paletaCores[index % paletaCores.length];

                return {
                    label: loja,
                    data: dadosLoja,
                    backgroundColor: cor,
                    borderColor: cor,
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 3,
                    pointHoverRadius: 6
                };
            });

            if (graficoDiarioObj) graficoDiarioObj.destroy();

            graficoDiarioObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsDias, 
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: { stacked: false },
                        y: { stacked: false, beginAtZero: true }
                    },
                    plugins: {
                        legend: { position: 'bottom' },
                        datalabels: { display: false }, 
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if(context.raw === 0) return null;
                                    return context.dataset.label + ': ' + formatarMoeda(context.raw);
                                }
                            }
                        }
                    }
                }
            });
        }

        function formatarMoeda(valor) {
            return (valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        iniciarPainel();
        setInterval(iniciarPainel, 300000);
    </script>
</body>
</html>
